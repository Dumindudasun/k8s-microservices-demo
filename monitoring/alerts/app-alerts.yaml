apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: three-tier-app-alerts
  namespace: default
  labels:
    release: monitoring
spec:
  groups:
    - name: three-tier-app.rules
      rules:
        - alert: FrontendPodDown
          expr: count(kube_pod_status_phase{namespace="default", pod=~"frontend-.*", phase="Running"} == 1) < 1
          for: 2m
          labels:
            severity: critical
            team: platform
            layer: frontend
          annotations:
            summary: "Frontend pod is down"
            description: "No running frontend pod detected in namespace default for more than 2 minutes."

        - alert: BackendPodDown
          expr: count(kube_pod_status_phase{namespace="default", pod=~"backend-.*", phase="Running"} == 1) < 1
          for: 2m
          labels:
            severity: critical
            team: platform
            layer: backend
          annotations:
            summary: "Backend pod is down"
            description: "No running backend pod detected in namespace default for more than 2 minutes."

        - alert: DatabasePodDown
          expr: count(kube_pod_status_phase{namespace="default", pod=~"mysql-.*", phase="Running"} == 1) < 1
          for: 2m
          labels:
            severity: critical
            team: platform
            layer: database
          annotations:
            summary: "Database pod is down"
            description: "No running database pod detected in namespace default for more than 2 minutes."

        - alert: PodRestartTooHigh
          expr: increase(kube_pod_container_status_restarts_total{namespace="default"}[10m]) > 1
          for: 2m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod restarting too frequently"
            description: "Pod {{ $labels.pod }} restarted more than once in the last 10 minutes."

        - alert: FrontendHighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="default", pod=~"frontend-.*"}[5m])) by (pod) > 0.5
          for: 5m
          labels:
            severity: warning
            team: platform
            layer: frontend
          annotations:
            summary: "High frontend CPU usage"
            description: "Frontend pod {{ $labels.pod }} CPU usage has been above 0.5 cores for 5 minutes."

        - alert: BackendHighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="default", pod=~"backend-.*"}[5m])) by (pod) > 0.5
          for: 5m
          labels:
            severity: warning
            team: platform
            layer: backend
          annotations:
            summary: "High backend CPU usage"
            description: "Backend pod {{ $labels.pod }} CPU usage has been above 0.5 cores for 5 minutes."

        - alert: DatabaseHighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="default", pod=~"mysql-.*"}[5m])) by (pod) > 0.5
          for: 5m
          labels:
            severity: warning
            team: platform
            layer: database
          annotations:
            summary: "High database CPU usage"
            description: "Database pod {{ $labels.pod }} CPU usage has been above 0.5 cores for 5 minutes."

        - alert: FrontendHighMemoryUsage
          expr: sum(container_memory_usage_bytes{namespace="default", pod=~"frontend-.*"}) by (pod) > 200000000
          for: 5m
          labels:
            severity: warning
            team: platform
            layer: frontend
          annotations:
            summary: "High frontend memory usage"
            description: "Frontend pod {{ $labels.pod }} memory usage has been above 200 MB for 5 minutes."

        - alert: BackendHighMemoryUsage
          expr: sum(container_memory_usage_bytes{namespace="default", pod=~"backend-.*"}) by (pod) > 200000000
          for: 5m
          labels:
            severity: warning
            team: platform
            layer: backend
          annotations:
            summary: "High backend memory usage"
            description: "Backend pod {{ $labels.pod }} memory usage has been above 200 MB for 5 minutes."

        - alert: DatabaseHighMemoryUsage
          expr: sum(container_memory_usage_bytes{namespace="default", pod=~"mysql-.*"}) by (pod) > 400000000
          for: 5m
          labels:
            severity: warning
            team: platform
            layer: database
          annotations:
            summary: "High database memory usage"
            description: "Database pod {{ $labels.pod }} memory usage has been above 400 MB for 5 minutes."

        - alert: DatabasePVCUsageHigh
          expr: (kubelet_volume_stats_used_bytes{namespace="default"} / kubelet_volume_stats_capacity_bytes{namespace="default"}) * 100 > 80
          for: 5m
          labels:
            severity: critical
            team: platform
            layer: database
          annotations:
            summary: "Database PVC usage is high"
            description: "Persistent volume usage is above 80% in namespace default for more than 5 minutes."

        - alert: OOMKilledDetected
          expr: sum(kube_pod_container_status_last_terminated_reason{namespace="default", reason="OOMKilled"}) by (pod) > 0
          for: 1m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "OOMKilled detected"
            description: "Pod {{ $labels.pod }} was terminated because of OOMKilled."

        - alert: PodNotReady
          expr: kube_pod_status_ready{namespace="default", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod not ready"
            description: "Pod {{ $labels.pod }} has been not ready for more than 5 minutes."